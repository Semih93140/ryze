#enterScreen {

    background: rgba(0,0,0,0.65);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
    cursor: pointer;

#enterScreen h1 {

    text-shadow: 0 0 15px #822fff;

}

#enterScreen p {
    font-size: 20px;

@keyframes pulse {

    50% { opacity: 1; }

/* --- GRILLE --- */
.cheat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    width: 75%;
    margin: 0 auto;
}

.cheat-box {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    border: 2px solid rgba(255,255,255,0.25);
    transition: 0.25s;
    box-shadow: 0 0 15px #00000055;
}

.cheat-box:hover {
    transform: scale(1.06);
    border-color: #000000;
    box-shadow: 0 0 20px #9d5cff55;
}

/* --- STATUS --- */
.status {
    margin-top: 10px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: bold;
    display: inline-block;
}

.working { background: #16a34a; }
.down { background: #dc2626; }
.soon { background: #f97316; }

/* --- BOUTON DOWNLOAD (GLASS) --- */

    color: white;
    cursor: pointer;
    font-size: 17px;
    font-weight: bold;
    transition: 0.25s;
    box-shadow: 0 0 12px #00000055;

.btn:hover {
    transform: scale(1.08);
    border-color: #9d5cff;
    box-shadow: 0 0 20px #9d5cff55;

/* --- FOOTER --- */
