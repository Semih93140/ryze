<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Site en maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      /* Fond GIF Discord/Tenor (fonctionnel) */
      background-image: url("https://cdn.discordapp.com/attachments/1478212344495734814/1483544306756091967/coding.gif?ex=69baf9cd&is=69b9a84d&hm=837e6f9bb8ff73677afef9494a679817147738490137a1539dda5c26cae02a84&");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .bloc {
      background: rgba(0, 0, 0, 0.6);
      padding: 30px 40px;
      border-radius: 12px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="bloc">
    <h1>Site en maintenance</h1>
    <p>Veuillez patienter, merci.</p>
  </div>
</body>
</html>
