        .btn { display: block; width: 100%; padding: 10px 0; text-align: center; text-decoration: none; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; font-size: 0.7rem; cursor: pointer; }

        // Protection Anti-Debug / Inspecter
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        let currentPage = 'home';

        function showPage(p) {
            currentPage = p;
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('pageTitle');
            grid.innerHTML = "";
            
            if(p === 'home') {
                title.innerText = "Home & Disclaimer";
                grid.innerHTML = `<div style="grid-column: 1 / -1; padding: 40px; text-align: center;"><div style="color:var(--red); font-weight:bold; font-size:1.2rem; margin-bottom:20px;">⚠️ RESPONSABILITÉ ⚠️</div><p>Utilisation sous votre entière responsabilité.</p></div>`;
                return;
            }
            
            title.innerText = p.toUpperCase();
            filterItems();
            if(document.getElementById('sideMenu').classList.contains('active')) toggleMenu();
        }

        function filterItems() {
            if(currentPage === 'home') return;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            const filtered = db.filter(i => (currentPage === 'all' || i.cat === currentPage) && i.name.toLowerCase().includes(search));
            
            filtered.forEach(i => {
                let isFree = i.price === 0;
                grid.innerHTML += `
                    <div class="card">
                        <img src="${i.img}" alt="${i.name}">
                        <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; margin-bottom:5px;">

                            </div>
                        </div>
                        <div class="price">${isFree ? "GRATUIT" : i.price.toFixed(2) + "€"}</div>
                        <div class="btn" onclick="window.open('${i.link}')">${isFree ? "DOWNLOAD" : "BUY NOW"}</div>
                    </div>`;
            });
        }

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        
        const audio = document.getElementById('main-audio');
        function startApp() { 
            document.getElementById('landing-screen').style.display = 'none'; 
            document.getElementById('main-content').classList.add('visible'); 
            audio.play(); 
        }
        
        function togglePlay() { 
            audio.paused ? (audio.play(), document.getElementById('play-btn').innerText="⏸") : (audio.pause(), document.getElementById('play-btn').innerText="▶");

        function setVolume(v) { audio.volume = v; }

        // Animation de neige
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, p = [];
        function init() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; p=[]; for(let i=0;i<100;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,s:Math.random()*1+0.5}); }
        function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.beginPath(); for(let i of p){ctx.moveTo(i.x,i.y);ctx.arc(i.x,i.y,i.r,0,Math.PI*2);i.y+=i.s;if(i.y>h)i.y=-10;} ctx.fill(); }
        window.onresize = init; 
        init(); 
        setInterval(draw, 30);
